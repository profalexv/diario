<button class="btn-print" id="btn-pdf" title="Salvar como PDF">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" width="16" height="16" fill="currentColor" aria-hidden="true">
    <path d="M64 0C28.7 0 0 28.7 0 64v384c0 35.3 28.7 64 64 64h256c35.3 0 64-28.7 64-64V160L224 0H64zm0 32h152l88 88v8H256c-17.7 0-32-14.3-32-32V32H64zm192 128c0 8.8 7.2 16 16 16h80v272c0 17.6-14.4 32-32 32H64c-17.6 0-32-14.4-32-32V64c0-17.6 14.4-32 32-32h152v96c0 35.3 28.7 64 64 64h8v-32zM111.1 257.4c-5.3-8-14.4-12.4-24.8-12.4H72c-4.4 0-8 3.6-8 8v88c0 4.4 3.6 8 8 8s8-3.6 8-8v-28h6.3c10.4 0 19.5-4.4 25.2-12.4 5.1-7 5.1-17.2 0-24.2-.1-.1-.2-.1-.4-.2-.9-6.2-3.2-12.7-8-18.8zM80 280h6.3c5.5 0 8.7 2 10.3 4.4 1.6 2.5 1.6 6.7 0 9.2-1.5 2.2-4.8 4.4-10.3 4.4H80v-18zm64-37c-4.4 0-8 3.6-8 8v88c0 4.4 3.6 8 8 8h20c17.6 0 32-14.4 32-32v-40c0-17.6-14.4-32-32-32h-20zm8 88v-72h12c8.8 0 16 7.2 16 16v40c0 8.8-7.2 16-16 16h-12zm80-88c-4.4 0-8 3.6-8 8v88c0 4.4 3.6 8 8 8s8-3.6 8-8v-36h24c4.4 0 8-3.6 8-8s-3.6-8-8-8h-24v-28h32c4.4 0 8-3.6 8-8s-3.6-8-8-8h-40z"/>
  </svg>
</button>

{{ content }}

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
document.getElementById('btn-pdf').addEventListener('click', function() {
  if (typeof html2pdf === 'undefined') {
    alert('Biblioteca de PDF não carregou. Verifique sua conexão e tente novamente.');
    return;
  }
  var titleText = title ? title.innerText.trim() : 'postagem';

  // Monta o conteúdo: título + corpo + assinatura
  var content = document.querySelector('.page__content');
  if (!content) return;

  var wrapper = document.createElement('div');
  wrapper.style.fontFamily = 'Georgia, serif';
  wrapper.style.fontSize = '11pt';
  wrapper.style.color = '#000';
  wrapper.style.padding = '0';

  var h = document.createElement('h1');
  h.style.fontSize = '16pt';
  h.style.marginBottom = '0.5em';
  h.innerText = titleText;
  wrapper.appendChild(h);

  var body = document.createElement('div');
  body.innerHTML = content.innerHTML;
  // Remove botão se estiver dentro do conteúdo
  var btnInside = body.querySelector('#btn-pdf');
  if (btnInside) btnInside.remove();
  wrapper.appendChild(body);

  var sig = document.createElement('p');
  sig.style.fontSize = '8pt';
  sig.style.color = '#666';
  sig.style.borderTop = '1px solid #ccc';
  sig.style.marginTop = '2em';
  sig.style.paddingTop = '0.5em';
  sig.innerText = 'Diário do Professor Alexandre  ·  ' + window.location.href;
  wrapper.appendChild(sig);

  var filename = titleText.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '')
    .substring(0, 60) + '.pdf';

  html2pdf().set({
    margin: [15, 15, 20, 15],
    filename: filename,
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css'] }
  }).from(wrapper).save();
});
</script>
